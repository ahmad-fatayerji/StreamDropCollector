name: Nightly Build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish UI/UI.csproj
          -c Release
          -r win-x64
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -o publish/

      - name: Zip output
        run: Compress-Archive -Path publish/* -DestinationPath StreamDropCollector-nightly.zip

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # First run won't have one yet

      - name: Create nightly release
        run: >
          gh release create nightly
          StreamDropCollector-nightly.zip
          --title "Nightly Build"
          --notes "Automated build from latest commit on master."
          --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
