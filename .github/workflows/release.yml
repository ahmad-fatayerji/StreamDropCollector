name: Release Build

on:
    push:
        tags: ["v*"]

jobs:
    build:
        runs-on: windows-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Publish (Self-Contained)
              run: >
                  dotnet publish UI/UI.csproj
                  -c Release
                  -r win-x64
                  -p:SelfContained=true
                  -o publish/self-contained/

            - name: Publish (Framework-Dependent)
              run: >
                  dotnet publish UI/UI.csproj
                  -c Release
                  -r win-x64
                  -p:SelfContained=false
                  -o publish/framework-dependent/

            - name: Zip (Self-Contained)
              run: Compress-Archive -Path publish/self-contained/* -DestinationPath StreamDropCollector-${{ github.ref_name }}-self-contained.zip

            - name: Zip (Framework-Dependent)
              run: Compress-Archive -Path publish/framework-dependent/* -DestinationPath StreamDropCollector-${{ github.ref_name }}-framework-dependent.zip

            - name: Get previous tag
              id: prev_tag
              shell: pwsh
              run: |
                  $prev = git tag --sort=-version:refname | Where-Object { $_ -ne "${{ github.ref_name }}" } | Select-Object -First 1
                  echo "tag=$prev" >> $env:GITHUB_OUTPUT

            - name: Create release
              shell: pwsh
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  $notes = @"
                  [Download it here](https://download-directory.github.io/?url=https://github.com/tsgsOFFICIAL/StreamDropCollector/tree/master/UI/bin/Release/net10.0-windows10.0.17763.0/publish/win-x64)
                  [Installation guide](https://github.com/tsgsOFFICIAL/StreamDropCollector?tab=readme-ov-file#quick-start)
                  Drop your comments on my [Discord](https://discord.gg/Cddu5aJ), or create an issue on GitHub.

                  **Full Changelog**: https://github.com/tsgsOFFICIAL/StreamDropCollector/compare/${{ steps.prev_tag.outputs.tag }}...${{ github.ref_name }}
                  "@

                  gh release create "${{ github.ref_name }}" `
                    "StreamDropCollector-${{ github.ref_name }}-self-contained.zip" `
                    "StreamDropCollector-${{ github.ref_name }}-framework-dependent.zip" `
                    --title "StreamDropCollector ${{ github.ref_name }}" `
                    --verify-tag `
                    --notes $notes
